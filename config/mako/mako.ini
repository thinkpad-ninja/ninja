# ────────────────────────────────────────────────────────────
# Custom Theme for Mako
# Made with Omarchist
# ────────────────────────────────────────────────────────────

text-color=#b76e79
border-color=#b76e79
background-color=#F5E6D3
width=420
height=110
padding=10
border-size=2
border-radius=6
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
