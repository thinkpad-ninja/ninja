# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle,compose:caps

    repeat_rate = 40
    repeat_delay = 600
    numlock_by_default = true

    touchpad {
        scroll_factor = 0.4
    }
}

# Disable touchpad (trackpoint/nub still works as a separate mouse device).
device {
    name = elan0676:00-04f3:3195-touchpad
    enabled = true
}

# Trackpoint tuning — reduce sensitivity to minimize drift.
# device {
#     name = tpps/2-synaptics-trackpoint
#     sensitivity = -0.4
#     accel_profile = adaptive
# }

# Terminal scroll tuning
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2
