# Apps
bindd = SUPER SHIFT, Z, Claude Code, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" -- bash -ic c
bindd = SUPER, Z, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
unbind = SUPER, F
bindd = SUPER, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, firefox
bindd = SUPER SHIFT, B, Chromium, exec, chromium
bindd = SUPER ALT, B, Brave, exec, brave
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER, T, Telegram, exec, telegram-desktop
bindd = SUPER, Y, Offline Notes, exec, /home/x/.local/bin/offline-notes
bindd = SUPER, H, Sublime, exec, subl
bindd = SUPER, L, CLion, exec, clion
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
unbind = SUPER, O
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
unbind = SUPER, G
bindd = SUPER, G, Bluetooth, exec, omarchy-launch-bluetooth

# Workspace nav
bindd = SUPER, K, Workspace 15, workspace, 15
bindd = SUPER, J, Workspace 12, workspace, 12
bindd = SUPER, S, Next workspace, workspace, e+1
bindd = SUPER, A, Previous workspace, workspace, e-1
bindd = SUPER, Page_Up, Workspace 15, workspace, 15
bindd = SUPER, Page_Down, Workspace 12, workspace, 12
unbind = SUPER, D

# Notifications / OSD
unbind = SUPER, V
bindd = SUPER, V, Switch to workspace 9, workspace, 9
bindd = ALT, V, Switch to workspace 7, workspace, 7
bindd = SUPER ALT, V, Switch to workspace 8, workspace, 8
unbind = SUPER, C
bindd = SUPER, C, Switch to workspace 2, workspace, 2
unbind = ALT, C
bindd = ALT, X, Switch to workspace 1, workspace, 1
unbind = SUPER CTRL, C
bindd = SUPER CTRL, C, Switch to workspace 3, workspace, 3
unbind = SUPER CTRL, V
bindd = SUPER CTRL, V, Switch to workspace 10, workspace, 10
unbind = SUPER, UP
bindd = SUPER, UP, Switch to workspace 22, workspace, 22
unbind = SUPER CTRL, K
bindd = SUPER CTRL, K, Open study video, exec, mpv /home/x/v/mp4/study1.webm
unbind = ALT, SPACE
bindd = ALT, SPACE, Sleep, exec, systemctl suspend

# Lock / Espanso / VPN
bindd = ALT, Z, Lock, exec, hyprlock
bindd = SUPER, slash, Toggle Espanso, exec, ~/.config/hypr/scripts/espanso-toggle.sh
bindd = SUPER, R, Toggle VPN connection, exec, /home/x/.local/bin/amnezia-toggle

# Lid switch (suspend with delay)
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off && ~/.config/hypr/scripts/lid-suspend-timer.sh arm
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on && ~/.config/hypr/scripts/lid-suspend-timer.sh cancel
bindd = SUPER SHIFT, S, Toggle lid-close auto-suspend (backpack mode), exec, ~/.config/hypr/scripts/lid-suspend-timer.sh toggle-arm

# Power profile
bindd = ALT, Page_Up, Lower power profile, exec, p=$(powerprofilesctl get); case "$p" in performance) n=balanced;; balanced) n=power-saver;; *) n=power-saver;; esac; powerprofilesctl set "$n"
bindd = ALT, Page_Down, Raise power profile, exec, p=$(powerprofilesctl get); case "$p" in power-saver) n=balanced;; balanced) n=performance;; *) n=performance;; esac; powerprofilesctl set "$n"

# Keyboard backlight toggle on ALT+TAB (sysfs writable via /etc/udev/rules.d/99-leds.rules)
# Overrides omarchy default ALT+TAB window cycling
unbind = ALT, TAB
bindd = ALT, TAB, Toggle keyboard light, exec, b=$(cat /sys/class/leds/tpacpi::kbd_backlight/brightness); [ "$b" -gt 0 ] && echo 0 > /sys/class/leds/tpacpi::kbd_backlight/brightness || echo 1 > /sys/class/leds/tpacpi::kbd_backlight/brightness

# Override omarchy media.conf brightness presets
unbind = ALT, W
unbind = ALT, E
bindeld = ALT, W, Brightness 5, exec, $osdclient --brightness 5
bindeld = ALT, E, Brightness 100, exec, $osdclient --brightness 100

# Screenshot: bypass omarchy-cmd-screenshot to skip wayfreeze (crashes Hyprland 0.54+ with wayfreeze 0.2)
# Moved from SUPER+Q to SUPER+SPACE (bottom-row thumb chord); keep the unbind so the crashy default SUPER+Q stays off.
unbind = SUPER, Q
bindd = SUPER, Q, Switch to workspace 22, workspace, 22
bindd = SUPER, SPACE, Screenshot (no freeze), exec, ~/.config/hypr/scripts/screenshot-nofreeze.sh

# Mute toggle: SUPER+TAB and SUPER+SHIFT+A (latter from omarchy default)
unbind = SUPER, TAB
bindeld = SUPER, TAB, Mute, exec, $osdclient --output-volume mute-toggle

# Move screen-off from SUPER+I to SUPER+SHIFT+SPACE (parked here after SUPER+SPACE was reassigned to screenshot)
unbind = SUPER, I
bindd = SUPER SHIFT, SPACE, Screen off, exec, sleep 0.3 && hyprctl dispatch dpms off

# ThinkPad input toggles
bindd = SUPER, HOME, Toggle touchpad, exec, ~/.config/hypr/scripts/touchpad-toggle.sh
bindd = SUPER, END, Toggle trackpoint low sensitivity, exec, ~/.config/hypr/scripts/trackpoint-sensitivity-toggle.sh

# Move suspend from SUPER+U to SUPER+ESCAPE (replaces the omarchy system menu binding)
unbind = SUPER, U
unbind = SUPER, ESCAPE
bindd = SUPER, ESCAPE, Sleep, exec, systemctl suspend
bindd = SUPER, DELETE, Shutdown, exec, systemctl poweroff
bindd = SUPER SHIFT, DELETE, Reboot, exec, systemctl reboot
