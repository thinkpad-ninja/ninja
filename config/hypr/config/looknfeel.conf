# Hide Hyprland's on-screen config-error popup. The errors come from omarchy's
# default looknfeel.conf using syntax newer than the installed Hyprland 0.55.2
# (col.border_locked_* = -1, dwindle:pseudotile) and are harmless.
debug {
    suppress_errors = true
}

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1
}

# Override omarchy's default 0.97/0.9 transparency
windowrule = opacity 1 1, match:class .*

# Don't let newly-opened or activating windows steal focus.
# Combined with misc.initial_workspace_tracking (default 1), an app launched
# from workspace N opens on N without yanking you back to it.
misc {
    focus_on_activate = false
    initial_workspace_tracking = 1
}
windowrule = no_initial_focus on, match:class .*

# Telegram Desktop (tdesktop, uses lib_ui) draws its own client-side window
# shadow on Wayland (SeparatePanel + main window via DefaultWindowHelper).
# Hyprland also draws a compositor shadow -> double shadow. Disable Hyprland's
# shadow for tdesktop windows so only the app's own shadow shows.
windowrule = no_shadow on, match:class ^(org.telegram.desktop|TelegramDesktop)$
