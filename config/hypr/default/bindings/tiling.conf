# This is now a deprecated file meant for those who did not wish to learn the latest Omarchy hotkeys.
# Do not make changes here, but bring them to tiling-v2.conf instead.

# Close windows
bindd = SUPER, X, Close window, killactive,
# bindd = SUPER, SHIFT, X, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
bindd = SUPER, T, Toggle window split, togglesplit, # dwindle
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
bindd = SUPER SHIFT, V, Toggle window floating/tiling, togglefloating,
# bindd = SHIFT, F11, Force full screen, fullscreen, 0
# bindd = ALT, F11, Full width, fullscreen, 1

# Move focus with SUPER + arrow keys
bindd = SUPER, LEFT, Move focus left, movefocus, l
bindd = SUPER, RIGHT, Move focus right, movefocus, r
bindd = SUPER, UP, Move focus up, movefocus, u
bindd = SUPER, DOWN, Move focus down, movefocus, d

# Switch workspaces with SUPER + [0-9]
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10


# Switch workspaces with SUPER + ALT + [0-9] (11-20)
bindd = SUPER ALT, code:10, Switch to workspace 11, workspace, 11
bindd = SUPER ALT, code:11, Switch to workspace 12, workspace, 12
bindd = SUPER ALT, code:12, Switch to workspace 13, workspace, 13
bindd = SUPER ALT, code:13, Switch to workspace 14, workspace, 14
bindd = SUPER ALT, code:14, Switch to workspace 15, workspace, 15
bindd = SUPER ALT, code:15, Switch to workspace 16, workspace, 16
bindd = SUPER ALT, code:16, Switch to workspace 17, workspace, 17
bindd = SUPER ALT, code:17, Switch to workspace 18, workspace, 18
bindd = SUPER ALT, code:18, Switch to workspace 19, workspace, 19
bindd = SUPER ALT, code:19, Switch to workspace 20, workspace, 20

# Switch workspaces with SUPER + CTRL + [0-9] (21-30)
bindd = SUPER CTRL, code:10, Switch to workspace 21, workspace, 21
bindd = SUPER CTRL, code:11, Switch to workspace 22, workspace, 22
bindd = SUPER CTRL, code:12, Switch to workspace 23, workspace, 23
bindd = SUPER CTRL, code:13, Switch to workspace 24, workspace, 24
bindd = SUPER CTRL, code:14, Switch to workspace 25, workspace, 25
bindd = SUPER CTRL, code:15, Switch to workspace 26, workspace, 26
bindd = SUPER CTRL, code:16, Switch to workspace 27, workspace, 27
bindd = SUPER CTRL, code:17, Switch to workspace 28, workspace, 28
bindd = SUPER CTRL, code:18, Switch to workspace 29, workspace, 29
bindd = SUPER CTRL, code:19, Switch to workspace 30, workspace, 30

# Switch workspaces with SUPER + CTRL + ALT + [0-9] (31-40)
bindd = SUPER CTRL ALT, code:10, Switch to workspace 31, workspace, 31
bindd = SUPER CTRL ALT, code:11, Switch to workspace 32, workspace, 32
bindd = SUPER CTRL ALT, code:12, Switch to workspace 33, workspace, 33
bindd = SUPER CTRL ALT, code:13, Switch to workspace 34, workspace, 34
bindd = SUPER CTRL ALT, code:14, Switch to workspace 35, workspace, 35
bindd = SUPER CTRL ALT, code:15, Switch to workspace 36, workspace, 36
bindd = SUPER CTRL ALT, code:16, Switch to workspace 37, workspace, 37
bindd = SUPER CTRL ALT, code:17, Switch to workspace 38, workspace, 38
bindd = SUPER CTRL ALT, code:18, Switch to workspace 39, workspace, 39
bindd = SUPER CTRL ALT, code:19, Switch to workspace 40, workspace, 40

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# Move active window to workspace with SUPER + ALT + SHIFT + [0-9] (11-20)
bindd = SUPER ALT SHIFT, code:10, Move window to workspace 11, movetoworkspace, 11
bindd = SUPER ALT SHIFT, code:11, Move window to workspace 12, movetoworkspace, 12
bindd = SUPER ALT SHIFT, code:12, Move window to workspace 13, movetoworkspace, 13
bindd = SUPER ALT SHIFT, code:13, Move window to workspace 14, movetoworkspace, 14
bindd = SUPER ALT SHIFT, code:14, Move window to workspace 15, movetoworkspace, 15
bindd = SUPER ALT SHIFT, code:15, Move window to workspace 16, movetoworkspace, 16
bindd = SUPER ALT SHIFT, code:16, Move window to workspace 17, movetoworkspace, 17
bindd = SUPER ALT SHIFT, code:17, Move window to workspace 18, movetoworkspace, 18
bindd = SUPER ALT SHIFT, code:18, Move window to workspace 19, movetoworkspace, 19
bindd = SUPER ALT SHIFT, code:19, Move window to workspace 20, movetoworkspace, 20

# Move active window to workspace with SUPER + CTRL + SHIFT + [0-9] (21-30)
bindd = SUPER CTRL SHIFT, code:10, Move window to workspace 21, movetoworkspace, 21
bindd = SUPER CTRL SHIFT, code:11, Move window to workspace 22, movetoworkspace, 22
bindd = SUPER CTRL SHIFT, code:12, Move window to workspace 23, movetoworkspace, 23
bindd = SUPER CTRL SHIFT, code:13, Move window to workspace 24, movetoworkspace, 24
bindd = SUPER CTRL SHIFT, code:14, Move window to workspace 25, movetoworkspace, 25
bindd = SUPER CTRL SHIFT, code:15, Move window to workspace 26, movetoworkspace, 26
bindd = SUPER CTRL SHIFT, code:16, Move window to workspace 27, movetoworkspace, 27
bindd = SUPER CTRL SHIFT, code:17, Move window to workspace 28, movetoworkspace, 28
bindd = SUPER CTRL SHIFT, code:18, Move window to workspace 29, movetoworkspace, 29
bindd = SUPER CTRL SHIFT, code:19, Move window to workspace 30, movetoworkspace, 30

# Move active window to workspace with SUPER + CTRL + ALT + SHIFT + [0-9] (31-40)
bindd = SUPER CTRL ALT SHIFT, code:10, Move window to workspace 31, movetoworkspace, 31
bindd = SUPER CTRL ALT SHIFT, code:11, Move window to workspace 32, movetoworkspace, 32
bindd = SUPER CTRL ALT SHIFT, code:12, Move window to workspace 33, movetoworkspace, 33
bindd = SUPER CTRL ALT SHIFT, code:13, Move window to workspace 34, movetoworkspace, 34
bindd = SUPER CTRL ALT SHIFT, code:14, Move window to workspace 35, movetoworkspace, 35
bindd = SUPER CTRL ALT SHIFT, code:15, Move window to workspace 36, movetoworkspace, 36
bindd = SUPER CTRL ALT SHIFT, code:16, Move window to workspace 37, movetoworkspace, 37
bindd = SUPER CTRL ALT SHIFT, code:17, Move window to workspace 38, movetoworkspace, 38
bindd = SUPER CTRL ALT SHIFT, code:18, Move window to workspace 39, movetoworkspace, 39
bindd = SUPER CTRL ALT SHIFT, code:19, Move window to workspace 40, movetoworkspace, 40

# TAB between workspaces
# bindd = SUPER, E, Next workspace, workspace, e+1
# bindd = SUPER, A, Previous workspace, workspace, e-1

bindd = SUPER, K, Next workspace, workspace, e+1
bindd = SUPER, J, Previous workspace, workspace, e-1

bind = SUPER, Y, exec, hyprctl dispatch dpms off
# bindd = SUPER, L, Former workspace, workspace, previous

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# Cycle through applications on active workspace
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, MOUSE_DOWN, Scroll active workspace forward, workspace, e+1
bindd = SUPER, MOUSE_UP, Scroll active workspace backward, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow
