# Close windows
bindd = SUPER, X, Close window, killactive,
# bindd = SUPER, ALT, backslash, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
# bindd = SUPER, J, Toggle window split, togglesplit, # dwindle
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
# bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1
bindd = SUPER, P, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# Move focus with SUPER + arrow keys
bindd = SUPER, LEFT, Move window focus left, movefocus, l
bindd = SUPER, RIGHT, Move window focus right, movefocus, r
bindd = SUPER, UP, Move window focus up, movefocus, u
bindd = SUPER, DOWN, Move window focus down, movefocus, d

# Switch workspaces with SUPER + [1-9; 0]
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

bindd = SUPER, F1, Switch to workspace 11, workspace, 11
bindd = SUPER, F2, Switch to workspace 12, workspace, 12
bindd = SUPER, F3, Switch to workspace 13, workspace, 13
bindd = SUPER, F4, Switch to workspace 14, workspace, 14
bindd = SUPER, F5, Switch to workspace 15, workspace, 15
bindd = SUPER, F6, Switch to workspace 16, workspace, 16
bindd = SUPER, F7, Switch to workspace 17, workspace, 17
bindd = SUPER, F8, Switch to workspace 18, workspace, 18
bindd = SUPER, F9, Switch to workspace 19, workspace, 19
bindd = SUPER, F10, Switch to workspace 20, workspace, 20

bindd = SUPER SHIFT, F1, Move window silently to workspace 11, movetoworkspacesilent, 11
bindd = SUPER SHIFT, F2, Move window silently to workspace 12, movetoworkspacesilent, 12
bindd = SUPER SHIFT, F3, Move window silently to workspace 13, movetoworkspacesilent, 13
bindd = SUPER SHIFT, F4, Move window silently to workspace 14, movetoworkspacesilent, 14
bindd = SUPER SHIFT, F5, Move window silently to workspace 15, movetoworkspacesilent, 15
bindd = SUPER SHIFT, F6, Move window silently to workspace 16, movetoworkspacesilent, 16
bindd = SUPER SHIFT, F7, Move window silently to workspace 17, movetoworkspacesilent, 17
bindd = SUPER SHIFT, F8, Move window silently to workspace 18, movetoworkspacesilent, 18
bindd = SUPER SHIFT, F9, Move window silently to workspace 19, movetoworkspacesilent, 19
bindd = SUPER SHIFT, F10, Move window silently to workspace 20, movetoworkspacesilent, 20

bindd = SUPER CTRL, code:10, Switch to workspace 21, workspace, 21
bindd = SUPER CTRL, code:11, Switch to workspace 22, workspace, 22
bindd = SUPER CTRL, code:12, Switch to workspace 23, workspace, 23
bindd = SUPER CTRL, code:13, Switch to workspace 24, workspace, 24
bindd = SUPER CTRL, code:14, Switch to workspace 25, workspace, 25
bindd = SUPER CTRL, code:15, Switch to workspace 26, workspace, 26
bindd = SUPER CTRL, code:16, Switch to workspace 27, workspace, 27
bindd = SUPER CTRL, code:17, Switch to workspace 28, workspace, 28
bindd = SUPER CTRL, code:18, Switch to workspace 29, workspace, 29
bindd = SUPER CTRL, code:19, Switch to workspace 30, workspace, 30

bindd = SUPER CTRL SHIFT, code:10, Move window to workspace 21, movetoworkspace, 21
bindd = SUPER CTRL SHIFT, code:11, Move window to workspace 22, movetoworkspace, 22
bindd = SUPER CTRL SHIFT, code:12, Move window to workspace 23, movetoworkspace, 23
bindd = SUPER CTRL SHIFT, code:13, Move window to workspace 24, movetoworkspace, 24
bindd = SUPER CTRL SHIFT, code:14, Move window to workspace 25, movetoworkspace, 25
bindd = SUPER CTRL SHIFT, code:15, Move window to workspace 26, movetoworkspace, 26
bindd = SUPER CTRL SHIFT, code:16, Move window to workspace 27, movetoworkspace, 27
bindd = SUPER CTRL SHIFT, code:17, Move window to workspace 28, movetoworkspace, 28
bindd = SUPER CTRL SHIFT, code:18, Move window to workspace 29, movetoworkspace, 29
bindd = SUPER CTRL SHIFT, code:19, Move window to workspace 30, movetoworkspace, 30

bindd = SUPER CTRL, F1, Switch to workspace 31, workspace, 31
bindd = SUPER CTRL, F2, Switch to workspace 32, workspace, 32
bindd = SUPER CTRL, F3, Switch to workspace 33, workspace, 33
bindd = SUPER CTRL, F4, Switch to workspace 34, workspace, 34
bindd = SUPER CTRL, F5, Switch to workspace 35, workspace, 35
bindd = SUPER CTRL, F6, Switch to workspace 36, workspace, 36
bindd = SUPER CTRL, F7, Switch to workspace 37, workspace, 37
bindd = SUPER CTRL, F8, Switch to workspace 38, workspace, 38
bindd = SUPER CTRL, F9, Switch to workspace 39, workspace, 39
bindd = SUPER CTRL, F10, Switch to workspace 40, workspace, 40

bindd = SUPER CTRL SHIFT, F1, Move window to workspace 31, movetoworkspace, 31
bindd = SUPER CTRL SHIFT, F2, Move window to workspace 32, movetoworkspace, 32
bindd = SUPER CTRL SHIFT, F3, Move window to workspace 33, movetoworkspace, 33
bindd = SUPER CTRL SHIFT, F4, Move window to workspace 34, movetoworkspace, 34
bindd = SUPER CTRL SHIFT, F5, Move window to workspace 35, movetoworkspace, 35
bindd = SUPER CTRL SHIFT, F6, Move window to workspace 36, movetoworkspace, 36
bindd = SUPER CTRL SHIFT, F7, Move window to workspace 37, movetoworkspace, 37
bindd = SUPER CTRL SHIFT, F8, Move window to workspace 38, movetoworkspace, 38
bindd = SUPER CTRL SHIFT, F9, Move window to workspace 39, movetoworkspace, 39
bindd = SUPER CTRL SHIFT, F10, Move window to workspace 40, movetoworkspace, 40

# Control scratchpad
# bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move workspaces to other monitors
bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# Cycle through applications on active workspace
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Toggle groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# Join groups
bindd = SUPER ALT, LEFT, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, UP, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d

# Navigate a single set of grouped windows
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
bindd = SUPER CTRL, LEFT, Move grouped window focus left, changegroupactive, b
bindd = SUPER CTRL, RIGHT, Move grouped window focus right, changegroupactive, f

# Scroll through a set of grouped windows with SUPER + ALT + scroll
bindd = SUPER ALT, mouse_down, Next window in group, changegroupactive, f
bindd = SUPER ALT, mouse_up, Previous window in group, changegroupactive, b

bind = SUPER, I, exec, sleep 0.3 && hyprctl dispatch dpms off

